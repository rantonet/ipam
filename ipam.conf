#
# ipam.conf — Configurazione Apache per IPAM (HTTPS)
# =====================================================
#
# SICUREZZA: questo file configura Apache con TLS obbligatorio.
#   - VirtualHost :80  → redirect permanente su HTTPS
#   - VirtualHost :443 → reverse proxy verso Gunicorn con SSL
#
# Prima di usare questo file:
#   1. Assicurarsi di avere un certificato TLS:
#        a) Autofirmato (già generato da install.sh):
#             /etc/ssl/certs/ipam.crt
#             /etc/ssl/private/ipam.key
#        b) Let's Encrypt:
#             certbot --apache -d <nome-host>
#   2. Adattare le variabili sotto:
#        /var/www/html/ipam  → percorso installazione IPAM
#        ipam.example.com    → nome host o IP del server
#        /etc/ssl/...        → percorso certificato e chiave
#
# Posizione Debian/Ubuntu:  /etc/apache2/sites-available/ipam.conf
#   Attivazione:  sudo a2ensite ipam && sudo systemctl reload apache2
#
# Posizione RHEL/Rocky/CentOS: /etc/httpd/conf.d/ipam.conf
#   Attivazione:  sudo systemctl reload httpd
#
# Moduli Apache richiesti (Debian/Ubuntu):
#   sudo a2enmod proxy proxy_http ssl headers
#

# Redirect HTTP → HTTPS (non trasmette mai credenziali in chiaro)
<VirtualHost *:80>
    ServerName ipam.example.com
    Redirect permanent / https://ipam.example.com/
</VirtualHost>

# Reverse proxy HTTPS verso Gunicorn
<VirtualHost *:443>
    ServerName ipam.example.com

    SSLEngine on
    SSLCertificateFile    /etc/ssl/certs/ipam.crt
    SSLCertificateKeyFile /etc/ssl/private/ipam.key

    # Informa Flask dello schema reale (richiesto per SESSION_COOKIE_SECURE)
    RequestHeader set X-Forwarded-Proto "https"

    # File statici serviti direttamente da Apache (piu' veloce di Gunicorn)
    Alias /ipam/static /var/www/html/ipam/static
    <Directory /var/www/html/ipam/static>
        Options -Indexes
        AllowOverride None
        Require all granted
    </Directory>

    # Protegge il database SQLite da accesso diretto
    <Directory /var/www/html/ipam/instance>
        Require all denied
    </Directory>

    # Reverse proxy verso Gunicorn (/static escluso dal proxy)
    ProxyPass        /ipam/static !
    ProxyPass        /ipam  http://127.0.0.1:8000/ipam
    ProxyPassReverse /ipam  http://127.0.0.1:8000/ipam
</VirtualHost>

#
# ── NOTE DI INSTALLAZIONE ────────────────────────────────────────────────────
#
#  Installazione automatica (consigliata):
#    sudo chmod +x install.sh
#    sudo ./install.sh
#  → genera automaticamente il certificato TLS autofirmato,
#    configura Apache HTTPS e avvia il servizio Gunicorn.
#
#  Installazione manuale (personalizzata):
#
#  1. Generare il certificato TLS autofirmato (se non si dispone di uno firmato):
#       sudo openssl req -x509 -newkey rsa:2048 \
#           -keyout /etc/ssl/private/ipam.key -out /etc/ssl/certs/ipam.crt \
#           -days 3650 -nodes -subj "/CN=$(hostname -f)/O=IPAM/C=IT"
#       sudo chmod 600 /etc/ssl/private/ipam.key
#
#  2. Adattare ServerName, percorsi SSL e directory in questo file.
#
#  3. Installare e abilitare i moduli Apache (Debian/Ubuntu):
#       sudo a2enmod proxy proxy_http ssl headers
#       sudo a2ensite ipam
#       sudo systemctl reload apache2
#     Oppure (RHEL/Rocky/CentOS):
#       sudo yum install mod_ssl   # o dnf install mod_ssl
#       sudo cp ipam.conf /etc/httpd/conf.d/
#       sudo systemctl reload httpd
#
#  4. Aprire il firewall:
#       sudo ufw allow 443/tcp     # Debian/Ubuntu
#       sudo firewall-cmd --permanent --add-service=https && firewall-cmd --reload
#
#  5. Verifica accesso:
#       https://<nome-host>/ipam/
#
#  Per certificato firmato (Let's Encrypt):
#       sudo certbot --apache -d <nome-host>
#

#
# ipam.conf — Configurazione Apache per IPAM
# ============================================
#
# Posizione su RHEL / Rocky Linux / AlmaLinux / CentOS / Fedora:
#   /etc/httpd/conf.d/ipam.conf
#
# Attivazione (il file viene caricato automaticamente da httpd.conf):
#   sudo systemctl reload httpd
#
# Variabili da adattare:
#   /var/www/ipam   → percorso dove è installata l'applicazione
#   apache          → utente Apache su RHEL/Rocky/Alma/CentOS
#                     (su Debian/Ubuntu sarebbe www-data)
#

# ── mod_wsgi: esegui in process dedicato (daemon mode) ──────────────────────
# Un process group isolato evita conflitti con altri siti sul server.
WSGIDaemonProcess ipam \
    user=apache \
    group=apache \
    threads=5 \
    python-path=/var/www/ipam \
    display-name=%{GROUP}

# ── Collega l'URL /ipam al file wsgi.py ─────────────────────────────────────
WSGIScriptAlias /ipam /var/www/ipam/wsgi.py

# ── Permessi directory applicazione ─────────────────────────────────────────
<Directory /var/www/ipam>
    WSGIProcessGroup  ipam
    WSGIApplicationGroup %{GLOBAL}
    Options          -Indexes +FollowSymLinks
    AllowOverride    None
    Require all granted
</Directory>

# ── Servi i file statici direttamente con Apache (più veloce di Python) ─────
# Apache gestisce CSS/JS/immagini senza passare per mod_wsgi.
Alias /ipam/static /var/www/ipam/static

<Directory /var/www/ipam/static>
    Options          -Indexes
    AllowOverride    None
    Require all granted

    # Cache browser per file statici (1 settimana)
    <IfModule mod_expires.c>
        ExpiresActive On
        ExpiresDefault "access plus 7 days"
    </IfModule>
</Directory>

# ── Protezione directory instance (database SQLite) ─────────────────────────
<Directory /var/www/ipam/instance>
    Require all denied
</Directory>

# ── Log dedicati (opzionale, rimuovi i commenti per attivarli) ───────────────
# ErrorLog  ${APACHE_LOG_DIR}/ipam_error.log
# CustomLog ${APACHE_LOG_DIR}/ipam_access.log combined

#
# ── NOTE DI INSTALLAZIONE ────────────────────────────────────────────────────
#
#  Installazione automatica (RHEL / Rocky / AlmaLinux / CentOS / Fedora):
#    sudo chmod +x /sorgente/ipam/install.sh
#    sudo /sorgente/ipam/install.sh
#
#  Installazione manuale:
#
#  1. Installa le dipendenze:
#       sudo dnf install httpd python3-mod_wsgi python3-pip epel-release
#       sudo pip3 install flask flask-sqlalchemy werkzeug
#
#  2. Copia l'applicazione:
#       sudo cp -r /sorgente/ipam /var/www/ipam
#
#  3. Inizializza il database:
#       sudo python3 -c "
#       import sys; sys.path.insert(0,'/var/www/ipam')
#       from app import app, db, seed_data
#       with app.app_context():
#           db.create_all(); seed_data()
#       "
#
#  4. Correggi i permessi e i contesti SELinux:
#       sudo chown -R apache:apache /var/www/ipam
#       sudo chmod 750 /var/www/ipam
#       sudo chmod 640 /var/www/ipam/instance/ipam.db
#       sudo semanage fcontext -a -t httpd_sys_content_t    "/var/www/ipam(/.*)?"
#       sudo semanage fcontext -a -t httpd_sys_rw_content_t "/var/www/ipam/instance(/.*)?"
#       sudo restorecon -Rv /var/www/ipam
#
#  5. Copia la conf e ricarica Apache:
#       sudo cp /var/www/ipam/ipam.conf /etc/httpd/conf.d/
#       sudo systemctl enable --now httpd
#       sudo systemctl reload httpd
#
#  6. Apri il firewall:
#       sudo firewall-cmd --permanent --add-service=http
#       sudo firewall-cmd --reload
#
#  7. Verifica accesso:
#       http://<IP-server>/ipam/
